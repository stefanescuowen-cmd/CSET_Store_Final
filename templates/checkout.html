{% extends "base.html" %}

{% block body %}

<h1>Checkout</h1>

<h2>Total: ${{ total }}</h2>

<form method="POST" action="/place-order">

    <!-- PAYMENT -->
    <h3>Payment Method</h3>

    <label><input type="radio" name="payment_method" value="card" required> Card</label><br>
    <label><input type="radio" name="payment_method" value="paypal"> PayPal</label><br>
    <label><input type="radio" name="payment_method" value="cod"> Cash on Delivery</label>

    <br><br>

    <button type="submit">Confirm Order</button>
</form>

{% endblock %}
