{% extends "base.html" %}

{% block body %}

<h1>Your Cart</h1>

{% if items %}
    <ul>
        {% for item in items %}
            <li>
                {{ item.title }} - Qty: {{ item.quantity }}

                <form method="POST" action="/remove-from-cart">
                    <input type="hidden" name="variant_id" value="{{ item.variant_id }}">
                    <button type="submit">Remove</button>
                </form>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Your cart is empty.</p>
{% endif %}

{% endblock %}
