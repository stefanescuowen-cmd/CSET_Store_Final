{% extends "base.html" %}

{% block body %}
<div class="edit-address-container">
    <div class="header-row">
        <h1>Edit Shipping Address</h1>
        <a href="{{ url_for('customer.manage_addresses') }}" class="btn-back">Cancel & Go Back</a>
    </div>

    <section class="form-container">
        <form action="{{ url_for('customer.edit_address', id=address.address_id) }}" method="POST">
            
            <div class="form-group">
                <label for="receiver_name">Receiver Name</label>
                <input type="text" id="receiver_name" name="receiver_name" 
                       value="{{ address.receiver_name }}" required>
            </div>

            <div class="form-group">
                <label for="contact_number">Contact Number</label>
                <input type="tel" id="contact_number" name="contact_number" 
                       value="{{ address.contact_number }}" required>
            </div>

            <div class="form-group">
                <label for="address_line1">Street Address</label>
                <input type="text" id="address_line1" name="address_line1" 
                       value="{{ address.address_line1 }}" required>
            </div>

            <div class="form-group">
                <label for="address_line2">Apt / Unit / Suite (Optional)</label>
                <input type="text" id="address_line2" name="address_line2" 
                       value="{{ address.address_line2 or '' }}">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" value="{{ address.city }}" required>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" value="{{ address.state }}" required>
                </div>
                <div class="form-group">
                    <label for="zip_code">Zip Code</label>
                    <input type="text" id="zip_code" name="zip_code" value="{{ address.zip_code }}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="address_type">Address Category</label>
                <select name="address_type" id="address_type" required>
                    <option value="Home" {% if address.address_type == 'Home' %}selected{% endif %}>Home</option>
                    <option value="Office" {% if address.address_type == 'Office' %}selected{% endif %}>Office</option>
                </select>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="is_default" name="is_default" 
                       {% if address.is_default %}checked{% endif %}>
                <label for="is_default">Set as default shipping address</label>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-submit">Update Address</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
