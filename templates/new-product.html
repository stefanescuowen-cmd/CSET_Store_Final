{% extends "base.html" %}

{% block body %}

<h1>Add Product</h1>

<div class="form-container">
    <h2>Enter Product Details</h2>
    <form method="POST" action="/add-product">
        <!--only show vendor id field if logged in user is an admin-->
        {% if role == "admin" %}
            <label for="vendor-id">Vendor ID:</label>
            <input type="number" id="vendor-id" name="vendor-id" required><br><br>
        {% endif %}

        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" required><br><br>

        <h3>Images</h3>
        <div id="images-container">
            <div class="image-group">
                <label for="image">Image URL:</label>
                <input type="text" id="image" name="image" required><br>
            </div>
        </div>

        <button type="button" onclick="addImage()">Add Image</button><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" required></textarea><br><br>

        <label for="price">Price:</label><br>
        <input type="number" id="price" name="price" step="0.01" min="0" required><br><br>

        <label for="discount_price">Discount Price (optional):</label><br>
        <input type="number" id="discount_price" name="discount_price" step="0.01" min="0"><br><br>

        <label for="discount_end">Discount End Date (optional):</label><br>
        <input type="datetime-local" id="discount_end" name="discount_end"><br><br>

        <h3>Variants</h3>
        <div id="variants-container">
            <div class="variant-group">
                <label>Color:</label>
                <input type="text" name="variant_color[]" required>

                <label>Size:</label>
                <input type="text" name="variant_size[]" required>

                <label>Stock:</label>
                <input type="number" name="variant_stock[]" min="0" required>

                <button type="button" onclick="removeVariant(this)">Remove</button>
            </div>
        </div>

        <button type="button" onclick="addVariant()">Add Variant</button><br><br>

        <button type="submit">Add Product</button>
    </form>
</div>

{% endblock %}
